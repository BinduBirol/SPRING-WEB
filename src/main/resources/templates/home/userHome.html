<!DOCTYPE html>
<html lang="en">

<head>
<th:block th:insert="~{theme/upper :: headLinks}"></th:block>
<title>Dashboard</title>
</head>

<body id="page-top">

	<!-- Page Wrapper -->
	<div id="wrapper">

		<!-- Sidebar -->
		<ui th:replace="~{theme/sidenav :: sidenav}"></ui>
		<!-- End of Sidebar -->

		<!-- Content Wrapper -->
		<div id="content-wrapper" class="d-flex flex-column">

			<!-- Main Content -->
			<div id="content">

				<!-- Topbar -->
				<nav th:replace="~{theme/upper :: upperNav}"></nav>
				<!-- End of Topbar -->

				<!-- Begin Page Content -->
				<div class="container-fluid">

					<!-- Page Heading -->
					<div
						class="d-sm-flex align-items-center justify-content-between mb-3">
						<h1 class="h3 mb-0 text-gray-800">Dashboard</h1>

					</div>

					<hr />


					<!-- Content Row -->

					<div class="">

						<!-- Header -->
						<h3>Welcome, [[${user.fullName}]]</h3>
						<p class="text-muted">User Dashboard Overview</p>

						<!-- Profile Section -->
						<div class="card mb-4">
							<div class="card-body d-flex align-items-center">

								<!-- User Image -->
								<img th:src="@{'/user/profile-image/' + ${user.id}}"
									class="rounded-circle img-thumbnail me-3 shadow-md border" style="width: 80px; height: 80px; object-fit: cover;" alt="User Image">

								<!-- User Info -->
								<div>
									<h5 class="mb-1">[[${user.fullName}]]</h5>
									<p class="mb-1">[[${user.email}]]</p>
									<span class="badge bg-primary">[[${user.role}]]</span>
								</div>

							</div>
						</div>

						<!-- Info Cards -->
						<div class="row g-3">

							<div class="col-md-4">
								<div class="card">
									<div class="card-body">
										<h6>Account Status</h6>
										<p class="mb-0">Active</p>
									</div>
								</div>
							</div>

							<div class="col-md-4">
								<div class="card">
									<div class="card-body">
										<h6>Last Login</h6>
										<p class="mb-0">Today</p>
									</div>
								</div>
							</div>

							<div class="col-md-4">
								<div class="card">
									<div class="card-body">
										<h6>Role</h6>
										<p class="mb-0">User</p>
									</div>
								</div>
							</div>

						</div>

						<!-- Actions -->
						<div class="card mt-4">
							<div class="card-body">
								<h5>Quick Actions</h5>

								<a href="#" class="btn btn-primary btn-sm mt-2">Edit Profile</a>
								<a href="#" class="btn btn-warning btn-sm mt-2">Reset
									Password</a>
							</div>
						</div>

					</div>
				</div>

				<!-- Content Row -->


			</div>
			<!-- /.container-fluid -->

		</div>
		<!-- End of Main Content -->




	</div>
	<!-- End of Content Wrapper -->

	</div>
	<!-- End of Page Wrapper -->

	<div th:replace="~{theme/lower :: staticFooter}"></div>



	<div th:replace="~{theme/lower :: footerlinks}"></div>

</body>

</html>
