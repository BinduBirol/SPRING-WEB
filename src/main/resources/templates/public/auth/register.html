
<!DOCTYPE html>
<html lang="en">

<head>
<th:block th:insert="~{theme/upper :: headLinks}"></th:block>
<title>Create account</title>
</head>

<body class="bg-gradient-danger">

	<div class="container">

		<!-- Outer Row -->
		<div class="row justify-content-center">

			<div class="col-xl-10 col-lg-12 col-md-9">

				<div class="card o-hidden border-0 shadow-lg my-5">
					<div class="card-body p-0">
						<!-- Nested Row within Card Body -->
						<div class="row">
							<div class="col-lg-6 d-none d-lg-block bg-login-image"></div>
							<div class="col-lg-6">
								<div class="p-5">
									<div class="text-center">
										<h1 class="h4 text-gray-900 mb-4">Create an Account!</h1>
									</div>
									<form th:action="@{/register}" method="post">
										<div class="row mb-3">
											<div class="col-md-6">
												<div class="form-floating mb-3 mb-md-0">
													<input class="form-control" id="inputFirstName" type="text" name="firstName" placeholder="Enter your first name" />
													<label for="inputFirstName">First name</label>
												</div>
											</div>
											<div class="col-md-6">
												<div class="form-floating">
													<input class="form-control" id="inputLastName" type="text" name="lastName" placeholder="Enter your last name" />
													<label for="inputLastName">Last name</label>
												</div>
											</div>
										</div>

										<div class="row mb-3">
											<div class="col-md-6">
												<div class="form-floating mb-3">
													<input class="form-control" id="inputEmail" type="email" name="email" placeholder="name@example.com" />
													<label for="inputEmail">Email address</label>
												</div>
											</div>
											<div class="col-md-6">
												<div class="form-floating">
													<select class="form-control" id="role" name="role" required>
														<option value="USER">USER</option>
														<option value="MODERATOR">MODERATOR</option>
														<option value="ADMIN">ADMIN</option>
													</select>
													<label for="role">Role</label>
												</div>
											</div>
										</div>


										<div class="row mb-3">
											<div class="col-md-6">
												<div class="form-floating mb-3 mb-md-0">
													<input class="form-control" id="inputPassword" type="password" placeholder="Create a password" />
													<label for="inputPassword">Password</label>
												</div>
											</div>
											<div class="col-md-6">
												<div class="form-floating mb-3 mb-md-0">
													<input class="form-control" id="inputPasswordConfirm" type="password" name="password" placeholder="Confirm password" />
													<label for="inputPasswordConfirm">Confirm Password</label>
												</div>
											</div>
										</div>
										<div class="mt-4 mb-0">
											<div class="d-grid">
												<button class="btn btn-primary btn-block">Create Account</button>
											</div>
										</div>
									</form>
									<hr>

									<div class="row">

										<div class="text-center col">
											<a class="small text-decoration-none" href="forgot-password.html">Forgot Password?</a>
										</div>
										<div class="text-center col">
											<a class="small text-decoration-none" th:href="@{/login}">Already registered? Login</a>
										</div>

									</div>


								</div>
							</div>
						</div>
					</div>
				</div>

			</div>

		</div>

	</div>

	<div th:replace="~{theme/lower :: footerlinks}"></div>

</body>

</html>
