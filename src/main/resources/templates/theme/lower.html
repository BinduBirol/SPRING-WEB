<div th:fragment="staticFooter">

<!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>

    <!-- Logout Modal-->
    <div class="modal fade" id="logoutModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel"
        aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Ready to Leave?</h5>
                    <button class="close" type="button" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">×</span>
                    </button>
                </div>
                <div class="modal-body">Select "Logout" below if you are ready to end your current session.</div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" type="button" data-dismiss="modal">Cancel</button>
                    <a class="btn btn-primary" th:href="@{/logout}">Logout</a>
                </div>
            </div>
        </div>
    </div>

</div>


<div th:fragment="footerlinks">
	
	
	<!-- Bootstrap core JavaScript-->
    <script th:src="@{/assets/vendor/jquery/jquery.min.js}"></script>
    <script th:src="@{/assets/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>

    <!-- Core plugin JavaScript-->
    <script th:src="@{/assets/vendor/jquery-easing/jquery.easing.min.js}"></script>

    <!-- Custom scripts for all pages-->
    <script th:src="@{/assets/js/sb-admin-2.min.js}"></script>

    <!-- Page level plugins -->
    <script th:src="@{/assets/sweetalert/sweetalert2.all.min.js}"></script>




	<script th:if="${error}" type="text/javascript">
	    Swal.fire({
	        title: "Error occurred!",
	        html: "[[${error}]]",
	        icon: "error",
	        confirmButtonText:"<i class='fa fa-thumbs-up'></i> I understand!"
	    });
	</script>

	<script th:if="${success}" type="text/javascript">
	    Swal.fire({
	        title: "Request successful!",
	        html: "[[${success}]]",
	        icon: "success",
	        confirmButtonText:"<i class='fa fa-thumbs-up'></i> Close"
	    });
	</script>

	<script>
	    $(document).ready(function () {
	        const currentPath = window.location.pathname;
	
	        // Highlight regular nav-items (no collapsible content)
	        $(".nav-item > .nav-link").each(function () {
	            const $link = $(this);
	            const href = $link.attr("href");
	
	            if (href && currentPath === href) {
	                $link.addClass("active");
	                $link.closest(".nav-item").addClass("active");
	            }
	        });
	
	        // Highlight collapse-inner items
	        $(".collapse-item").each(function () {
	            const $item = $(this);
	            const href = $item.attr("href");
	
	            if (href && currentPath.endsWith(href)) {
	                $item.addClass("active");
	
	                const $collapseDiv = $item.closest(".collapse");
	                $collapseDiv.addClass("show");
	
	                const $navLink = $collapseDiv.siblings(".nav-link");
	                $navLink.removeClass("collapsed").addClass("active");
	
	                const $parentNavItem = $collapseDiv.closest(".nav-item");
	                $parentNavItem.addClass("active");
	            }
	        });
	    });
	</script>






</div>
